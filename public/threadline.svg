<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- T letterform made of thread lines -->
  <g stroke="#fff" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Top horizontal bar -->
    <line x1="128" y1="148" x2="384" y2="148"/>
    <!-- Vertical stem -->
    <line x1="256" y1="148" x2="256" y2="380"/>
  </g>
  <!-- Three small dots representing threads/community -->
  <circle cx="152" cy="380" r="22" fill="#fff" opacity="0.7"/>
  <circle cx="256" cy="380" r="22" fill="#fff"/>
  <circle cx="360" cy="380" r="22" fill="#fff" opacity="0.7"/>
</svg>
